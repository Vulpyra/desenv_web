<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Financeiro Oficial - Atividade 03</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="dashboard">
        <header class="top-bar">
            <i class="fas fa-bars menu-icon"></i>
            <div class="top-icons">
                <i class="far fa-eye" id="toggle-visibility" title="Ocultar valores"></i>
                <i class="far fa-user-circle"></i>
            </div>
        </header>

        <section class="stats-grid">
            <div class="stat-card">
                <span class="label">Patrimônio</span>
                <span class="value hide-value">R$ 127.528,75</span>
            </div>
            <div class="stat-card">
                <span class="label">Renda Mensal</span>
                <span class="value hide-value">R$ 14.789,50</span>
            </div>
            <div class="stat-card">
                <span class="label">Renda declarada</span>
                <span class="value hide-value">R$ 890 / R$ 1.300</span>
            </div>
        </section>

        <section class="main-content">
            <div class="chart-section">
                <div class="pie-chart"></div>
                <div class="chart-labels">
                    <div class="label-item left">
                        <p>Renda Não dedutível</p>
                        <span>55%</span>
                    </div>
                    <div class="label-item right">
                        <p>Renda dedutível</p>
                        <span>45%</span>
                    </div>
                </div>
            </div>

            <div class="sidebar-actions">
                <div class="ai-suggestion-box">
                    <div class="ai-header">
                        <div class="icon-circle">
                            <i class="fas fa-dollar-sign"></i>
                        </div>
                        <h3>Sugestão da IA</h3>
                    </div>
                    <p>Invista R$ 500 em saúde e economize + R$ 1000 por mês de imposto</p>
                </div>

                <div class="quick-actions">
                    <button class="btn-outline"><i class="fas fa-plus"></i> Receita</button>
                    <button class="btn-outline"><i class="fas fa-plus"></i> Despesas</button>
                </div>

                <button class="btn-main-action">Novo Simulado</button>
            </div>
        </section>
    </div>

    <script src="index.js"></script>
</body>
</html>
